<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Nation Flags</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a1a; color: white; text-align: center; padding: 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; max-width: 1000px; margin: 0 auto; }
        .card { background: #333; padding: 20px; border-radius: 15px; border: 2px solid #444; }
        img { width: 100%; border-radius: 5px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        h3 { margin-top: 15px; }
    </style>
</head>
<body>
    <h1>International Cricket Flags</h1>
    <div class="grid">
        <div class="card"><img src="https://flagcdn.com/w320/in.png"><h3>INDIA</h3></div>
        <div class="card"><img src="https://flagcdn.com/w320/za.png"><h3>SOUTH AFRICA</h3></div>
        <div class="card"><img src="https://flagcdn.com/w320/gb-eng.png"><h3>ENGLAND</h3></div>
        <div class="card"><img src="https://flagcdn.com/w320/nz.png"><h3>NEW ZEALAND</h3></div>
    </div>
</body>
</html>
